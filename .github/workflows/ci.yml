name: CI - Build & Push Docker Image

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  SERVICE_NAME: 'healthcare-core-service'

jobs:
  build-and-push:
    # 💥 BẮT BUỘC để GitHub Actions được phép xin mượn token OIDC của AWS
    permissions:
      id-token: write 
      contents: read
    name: 🏗️ Build & Push
    runs-on: ubuntu-latest
    
    # Khởi tạo một database MongoDB phụ trợ độc lập cho việc Unit Test
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: 🧪 Run Unit Tests
        run: mvn test --batch-mode --fail-at-end

      - name: 📦 Build with Maven
        run: mvn clean package -DskipTests --batch-mode

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- TÍCH HỢP AWS VÀ OIDC ---
      - name: 🔐 Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-southeast-1
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }} # Đọc từ thẻ Secrets trên GitHub

      - name: 🚪 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        
      - name: 🚀 Build & Push Docker Image to ECR
        uses: docker/build-push-action@v5
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.SERVICE_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
